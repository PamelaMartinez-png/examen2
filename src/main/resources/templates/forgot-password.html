<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salón | Recuperar Contraseña</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
    <div class="login-logo"><a href="#"><b>Salón</b> de Belleza</a></div>
    <div class="card">
        <div class="card-body login-card-body">
            <p class="login-box-msg">Recupera tu contraseña</p>
            <div th:if="${success}" class="alert alert-success"><i class="icon fas fa-check"></i> <span th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-danger"><i class="icon fas fa-ban"></i> <span th:text="${error}"></span></div>
            <form th:action="@{/auth/forgot}" method="post">
                <div class="input-group mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Tu email registrado" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-block">Enviar instrucciones</button>
                    </div>
                </div>
            </form>
            <p class="mt-3 mb-0"><a th:href="@{/auth/login}">Volver al login</a></p>
        </div>
    </div>
</div>
<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>
</body>
</html>
